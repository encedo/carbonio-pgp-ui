name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # required to create GitHub Releases

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout carbonio-pgp-ui
        uses: actions/checkout@v4
        with:
          path: carbonio-pgp-ui

      - name: Checkout hem-sdk-js
        uses: actions/checkout@v4
        with:
          repository: encedo/hem-sdk-js
          path: hem-sdk-js

      - name: Checkout encedo-pgp-js
        uses: actions/checkout@v4
        with:
          repository: encedo/encedo-pgp-js
          path: encedo-pgp-js

      - name: Checkout carbonio-mails-ui
        uses: actions/checkout@v4
        with:
          repository: encedo/carbonio-mails-ui
          path: carbonio-mails-ui

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: carbonio-pgp-ui/package-lock.json

      - name: Build encedo-pgp-js
        working-directory: encedo-pgp-js
        run: npm ci && npm run build

      - name: Install dependencies
        working-directory: carbonio-pgp-ui
        run: npm ci

      - name: Build
        working-directory: carbonio-pgp-ui
        run: npm run build

      - name: Build .deb
        id: deb
        run: |
          PKG_NAME="carbonio-pgp-ui"
          PKG_VERSION=$(node -p "require('./carbonio-pgp-ui/package.json').version")
          PKG_REL="1+HEM${{ github.run_number }}"
          COMMIT="${{ github.sha }}"
          INSTALL_DIR="/opt/zextras/web/iris/${PKG_NAME}/${COMMIT}"

          DEB_ROOT="$(pwd)/deb-root"
          mkdir -p "${DEB_ROOT}/DEBIAN"
          mkdir -p "${DEB_ROOT}${INSTALL_DIR}"

          # Copy built assets
          cp -a carbonio-pgp-ui/dist/* "${DEB_ROOT}${INSTALL_DIR}/"

          # DEBIAN/control
          cat > "${DEB_ROOT}/DEBIAN/control" <<EOF
          Package: ${PKG_NAME}
          Version: ${PKG_VERSION}-${PKG_REL}
          Architecture: amd64
          Maintainer: Encedo <packages@encedo.com>
          Section: admin
          Priority: optional
          Depends: carbonio-nginx, carbonio-webui-i18n, jq
          Description: OpenPGP encryption/decryption for Carbonio via Encedo HEM
          EOF

          # DEBIAN/postinst (same logic as PKGBUILD postinst)
          cat > "${DEB_ROOT}/DEBIAN/postinst" <<'EOF'
          #!/bin/bash
          set -e
          PKG_NAME="carbonio-pgp-ui"
          COMMIT_DIR=$(ls /opt/zextras/web/iris/${PKG_NAME}/ | grep -v current | head -1)
          mkdir -p "/opt/zextras/web/iris/${PKG_NAME}/current"
          cd "/opt/zextras/web/iris/${PKG_NAME}/${COMMIT_DIR}"
          find . -name "*.html" -exec cp --parents "{}" /opt/zextras/web/iris/${PKG_NAME}/current/ \;
          find /opt/zextras/web/iris/ \
            -maxdepth 3 -mindepth 3 -type f -name component.json \
            -printf '%T@ %p\n' \
            | sort -rn \
            | awk '{n=split($2,path,"/"); c=path[6]; if(!seen[c]++) print $2}' \
            | xargs jq -s '{"components":.}' >/opt/zextras/web/iris/components.json
          EOF
          chmod 755 "${DEB_ROOT}/DEBIAN/postinst"

          DEB_FILE="${PKG_NAME}_${PKG_VERSION}-${PKG_REL}_amd64.deb"
          dpkg-deb --build "${DEB_ROOT}" "${DEB_FILE}"

          echo "deb_file=${DEB_FILE}" >> $GITHUB_OUTPUT
          echo "version=${PKG_VERSION}-${PKG_REL}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.deb.outputs.version }}
          name: v${{ steps.deb.outputs.version }}
          files: ${{ steps.deb.outputs.deb_file }}
          generate_release_notes: false
          body: |
            Build ${{ github.run_number }} — commit ${{ github.sha }}
