name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout carbonio-pgp-ui
        uses: actions/checkout@v4
        with:
          path: carbonio-pgp-ui

      - name: Checkout hem-sdk-js
        uses: actions/checkout@v4
        with:
          repository: encedo/hem-sdk-js
          path: hem-sdk-js

      - name: Checkout encedo-pgp-js
        uses: actions/checkout@v4
        with:
          repository: encedo/encedo-pgp-js
          path: encedo-pgp-js

      - name: Checkout carbonio-mails-ui
        uses: actions/checkout@v4
        with:
          repository: encedo/carbonio-mails-ui
          path: carbonio-mails-ui

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: carbonio-pgp-ui/package-lock.json

      - name: Build encedo-pgp-js
        working-directory: encedo-pgp-js
        run: npm ci && npm run build

      - name: Install dependencies
        working-directory: carbonio-pgp-ui
        run: npm ci

      - name: Build
        working-directory: carbonio-pgp-ui
        run: npm run build

      - name: Install makedeb
        run: |
          wget -qO - 'https://proget.makedeb.org/debian-feeds/makedeb.pub' \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/makedeb-archive-keyring.gpg > /dev/null
          echo 'deb [signed-by=/usr/share/keyrings/makedeb-archive-keyring.gpg arch=all] https://proget.makedeb.org/ makedeb main' \
            | sudo tee /etc/apt/sources.list.d/makedeb.list
          sudo apt-get update -q
          sudo apt-get install -y makedeb

      - name: Build .deb
        id: deb
        working-directory: carbonio-pgp-ui/dist/package
        run: |
          PKG_VERSION=$(node -p "require('../../package.json').version")
          PKG_REL="1+HEM${{ github.run_number }}"

          sed -i "s/^pkgrel=.*/pkgrel=\"${PKG_REL}\"/" PKGBUILD

          # Source tarball expected by PKGBUILD
          tar -czf carbonio-pgp-ui-dist.tar.gz -C ../.. dist/

          makedeb -s --no-confirm

          DEB=$(ls *.deb | head -1)
          echo "deb_file=carbonio-pgp-ui/dist/package/${DEB}" >> $GITHUB_OUTPUT
          echo "version=${PKG_VERSION}-${PKG_REL}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.deb.outputs.version }}
          name: v${{ steps.deb.outputs.version }}
          files: ${{ steps.deb.outputs.deb_file }}
          generate_release_notes: false
          body: |
            Build ${{ github.run_number }} — commit ${{ github.sha }}
